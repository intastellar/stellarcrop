name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies and run checks
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm --recursive run lint

      - name: Run type checking
        run: pnpm --recursive run typecheck

      - name: Run tests
        run: pnpm --recursive run test

  build-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Run contract tests
        run: cargo test --manifest-path contracts/Cargo.toml --workspace --locked

      - name: Build contract
        run: cargo build --manifest-path contracts/Cargo.toml --workspace --target wasm32-unknown-unknown --release --locked

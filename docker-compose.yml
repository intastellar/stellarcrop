services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stellarcrop
      POSTGRES_PASSWORD: stellarcrop
      POSTGRES_DB: stellarcrop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api/.env
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
    ports:
      - "3001:3000"
    env_file:
      - ./apps/web/.env
    depends_on:
      - api

volumes:
  postgres_data:
